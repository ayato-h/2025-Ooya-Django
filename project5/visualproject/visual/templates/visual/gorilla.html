{% extends 'base.html' %}
{% load static %}

{% block title %} Gorilla {% endblock %}
{% block h1 %} Gorilla {% endblock %}

{% block content %}

<section id="products">
<div class="list-grid-simple">

{% for item in items %}
<div class="list">
<figure><img src="{% static 'visual/images/' %}{{ item }}gorilla.jpg" alt=""></figure>
<div class="button-container">
    <form method="get" action="{% url 'visual:gorilla-result' %}">
        <input type="hidden" name="item" value="{{ item }}">
        <button type="submit" class="gorilla-button">▲</button>
    </form>
</div>
</div>
{% endfor %}

</div>

</section>



{% endblock %}

{% extends 'base.html' %}
{% load i18n %}
{% load static %}

{% block title %}{% trans "設定" %}{% endblock %}

{% block content %}

<div class="index song-score">
    <form method="post" class="setting-form">
        <div class="setting">
            <h2>{% trans "テーマ" %}</h2>
            {% csrf_token %}
            <select name="theme" class="setting-select">
                <option value="white" {% if request.user.theme|default:"white" == "white" %}selected{% endif %}>{% trans "白" %}</option>
                <option value="black" {% if request.user.theme == "black" %}selected{% endif %}>{% trans "黒" %}</option>
            </select>
            <button type="submit" name="form_type" value="theme" class="setting-button">{% trans "保存" %}</button>
        </div>
    </form>

    <form action="{% url 'set_language' %}" method="post" class="setting-form">
        <div class="setting">
            <h2>{% trans "言語" %}</h2>
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.path }}">
            <select name="language" class="setting-select">
                <option value="ja" {% if request.LANGUAGE_CODE == "ja" %}selected{% endif %}>{% trans "日本語" %}</option>
                <option value="en" {% if request.LANGUAGE_CODE == "en" %}selected{% endif %}>English</option>
            </select>
            <button type="submit" class="setting-button">{% trans "保存" %}</button>
        </div>
    </form>
    <form method="post" class="setting-form">
        <div class="setting">
            <h2>{% trans "情報" %}</h2>
            {% csrf_token %}

            <select name="is_public" class="setting-select">
                <option value="true" {% if request.user.is_public %}selected{% endif %}>
                    {% trans "公開" %}
                </option>
                <option value="false" {% if not request.user.is_public %}selected{% endif %}>
                    {% trans "非公開" %}
                </option>
            </select>

            <button
                type="submit"
                name="form_type"
                value="privacy"
                class="setting-button"
            >
                {% trans "保存" %}
            </button>
        </div>
    </form>

</div>


{% endblock %}

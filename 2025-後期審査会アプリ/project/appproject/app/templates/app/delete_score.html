{% extends 'base.html' %}
{% load i18n %}
{% load static %}

{% block title %} {% trans "点数削除" %} {% endblock %}

{% block content %}
<div class="index song-score">
    <h2>{{ object.song.track_name }} - {{ object.song.artist_name }} | {% trans "点数" %}: {{ object.score }}</p>
</div>

<form method="post" class="delete-form">
    {% csrf_token %}
    <button type="submit">{% trans "削除" %}</button>
    <a href="{% url 'app:score_list' %}">{% trans "キャンセル" %}</a>
</form>
{% endblock %}
